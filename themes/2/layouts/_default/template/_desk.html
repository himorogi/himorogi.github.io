  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      max-width: 100vw;
    }
    header{
    display: none;
  }
    .desk {
      height: 100svh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      color: #000000;


      h1,
      .text {
        padding: 0 .5rem;
      }

      h1 {
        margin: 0;
        border: solid 1px black;
        border-bottom: none;
        text-align: center;
        background-color: palegreen;
        font-size: min(2rem, 6vw);
      }

      .text {
        border: solid 1px black;
        border-top: none;
        background: #fff;
        min-height: min(10rem, 25vh);
        overflow-y: auto;
        overflow-x: hidden;
      }
    }

    .grid {
      width: 100%;
      height: auto;
      image-rendering: pixelated;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(15em, 30vw), auto));
      background: no-repeat center bottom / 85% url(images/desk.png), center/ 2vh url(images/desk_bg.png);
      background-color: white;
      border: solid 1px black;
      gap: 0 2rem;
      justify-items: center;
      padding-bottom:30vh;
    }

    .desk ::-webkit-scrollbar {
      width: 1.5rem;
      height: 1.5rem;
      background-color: white;
    }

    .desk ::-webkit-scrollbar-thumb {
      background: 0 0;
      box-shadow: 0 0 0 1px rgb(0, 0, 0);
      background-color: rgb(255, 189, 165);
      border-left: solid 1px;

    }

    .desk ::-webkit-scrollbar-track {
      background-color: white;
      background-image: none;
      background-size: 1rem 1rem;
      border-left: solid 1px;
    }
  </style>
