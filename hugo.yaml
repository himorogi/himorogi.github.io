frontmatter:
  lastmod:
  - lastmod

pagination:
  disableAliases: false
  pagerSize: 5
  path: page

disableKinds:
- rss
- sitemap
- taxonomy

taxonomies:
  tag: tags
  year: year
  # main: main

permalinks:
  term:
    tags: /posts/:slug/
    year: /posts/:slug/
    main: /images/:slug/



markup:
  tableOfContents:
    endLevel: 6
    ordered: true
    startLevel: 2
  goldmark:
      parser:
        attribute:
          block: true
          title: true
      # wrapStandAloneImageWithinParagraph: false
      renderHooks:
        image:
          enableDefault: true
      renderer:
        hardWraps: true
        unsafe: true
