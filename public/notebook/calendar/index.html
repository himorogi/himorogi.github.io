<script>
    const weeks = ['日', '月', '火', '水', '木', '金', '土']
    const date = new Date()
    const year = date.getFullYear()
    const month = date.getMonth() + 1
    const monthStr = ["", "January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const config = {
        show: 2,
    }

    function showCalendar(year, month) {
        for (i = 0; i < config.show; i++) {
            const calendarHtml = createCalendar(year, month)
            const sec = document.createElement('div')
            sec.innerHTML = calendarHtml
            document.querySelector('#calendar').appendChild(sec)

            month++
            if (month > 12) {
                year++
                month = 1
            }
        }
    }

    function createCalendar(year, month) {
        const startDate = new Date(year, month - 1, 1) 
        const endDate = new Date(year, month, 0) 
        const endDayCount = endDate.getDate() 
        const lastMonthEndDate = new Date(year, month - 1, 0) 
        const lastMonthendDayCount = lastMonthEndDate.getDate() 
        const startDay = startDate.getDay() 
        let dayCount = 1 
        let calendarHtml = '' 

        calendarHtml += '<h1><span>' + month + '&nbsp;&nbsp;<span>' + monthStr[month] + '</span></span><span>' + year + '</span></h1>'
        calendarHtml += '<table>'

        
        for (let i = 0; i < weeks.length; i++) {
            calendarHtml += '<td>' + weeks[i] + '</td>'
        }

        for (let w = 0; w < 6; w++) {
            calendarHtml += '<tr>'

            for (let d = 0; d < 7; d++) {
                if (w == 0 && d < startDay) {
                    
                    let num = lastMonthendDayCount - startDay + d + 1
                    calendarHtml += '<td class="is-disabled">' + num + '</td>'
                } else if (dayCount > endDayCount) {
                    
                    let num = dayCount - endDayCount
                    calendarHtml += '<td class="is-disabled">' + num + '</td>'
                    dayCount++
                } else {
                    calendarHtml += `<td data-date="${year}/${month}/${dayCount}">` + dayCount + '<span></span></td>'
                    dayCount++
                }
            }
            calendarHtml += '</tr>'
        }
        calendarHtml += '</table>'

        return calendarHtml
    }

    showCalendar(year, month)

    const syukujitsuList = { "2025/1/1":  "元日" , "2025/1/13":  "成人の日" , "2025/10/13":  "スポーツの日" , "2025/11/23":  "勤労感謝の日" , "2025/11/24":  "振替休日" , "2025/11/3":  "文化の日" , "2025/2/11":  "建国記念の日" , "2025/2/23":  "天皇誕生日" , "2025/2/24":  "振替休日" , "2025/3/20":  "春分の日" , "2025/4/29":  "昭和の日" , "2025/5/3":  "憲法記念日" , "2025/5/4":  "みどりの日" , "2025/5/5":  "こどもの日" , "2025/5/6":  "振替休日" , "2025/7/21":  "海の日" , "2025/8/11":  "山の日" , "2025/9/15":  "敬老の日" , "2025/9/23":  "秋分の日" ,  };
    const calenderDataDate = document.querySelectorAll('td[data-date]');
    const sekkiList = { "2025/1/05": "小寒", "2025/1/20": "大寒", "2025/2/03": "立春", "2025/2/18": "雨水", "2025/3/05": "啓蟄", "2025/3/20": "春分", "2025/4/04": "清明", "2025/4/20": "穀雨", "2025/5/05": "立夏", "2025/5/21": "小満", "2025/6/05": "芒種", "2025/6/21": "夏至", "2025/7/07": "小暑", "2025/7/22": "大暑", "2025/8/07": "立秋", "2025/8/23": "処暑", "2025/9/07": "白露", "2025/9/23": "秋分", "2025/10/08": "寒露", "2025/10/23": "霜降", "2025/11/07": "立冬", "2025/11/22": "小雪", "2025/12/07": "大雪", "2025/12/22": "冬至", "2026/1/05": "小寒", "2026/1/20": "大寒",  };

    calenderDataDate.forEach((item, index) => {

        if (1 < Object.keys(syukujitsuList).indexOf(item.dataset.date)) {
            item.classList.add('syuku');
            item.querySelector('span').setAttribute("text", syukujitsuList[item.dataset.date]);
        }
        if (1 < Object.keys(sekkiList).indexOf(item.dataset.date)) {
            item.querySelector('span').setAttribute("sekki", sekkiList[item.dataset.date]);
        }
    });
