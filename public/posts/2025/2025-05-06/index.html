    <h1 class="title">さよなら / 鈴の音</h1>

    

     
    

<p>生き方について考えるためのGWだった。ほとんど夢のような現実味を失ったような、それでいてどうでもいい物事の嵐。</p>
<p>気づけばもう5月で雨は肌寒いけれど初夏の日差しだ。やっとパソコンの前に座っている。これからまた制作を再開するのだろう。<br>
まずは食事と睡眠と少しの休暇。寝不足でとんでもないことになっていたので修正作業もしたい。がんばるぞー</p>
